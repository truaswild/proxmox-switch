<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Proxmox Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1 data-i18n="title">Proxmox Control</h1>
      <div class="header-right">
        <button class="icon-btn" id="menuBtn" title="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
          </svg>
        </button>
        <div class="dropdown" id="dropdownMenu">
          <button class="dropdown-item" id="menuShutdownAll">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
            <span data-i18n="menu_shutdown_all">Shutdown All VMs</span>
          </button>
          <button class="dropdown-item dropdown-danger" id="menuForceStopAll">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
            <span data-i18n="menu_force_stop_all">Force Stop All VMs</span>
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" id="menuLogs">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span data-i18n="menu_logs">Logs</span>
          </button>
          <button class="dropdown-item" id="menuSettings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span data-i18n="menu_settings">Settings</span>
          </button>
          <div class="dropdown-divider"></div>
          <a href="/logout" class="dropdown-item dropdown-danger" style="text-decoration:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span data-i18n="menu_logout">Logout</span>
          </a>
        </div>
      </div>
    </header>

    <main>
      <!-- Switch cards rendered dynamically -->
      <div id="switchContainer"></div>

      <!-- Power Off Section (visibility controlled by settings) -->
      <section class="card power-card" id="powerCard" style="display:none">
        <h2 data-i18n="power_off_title">POWER OFF</h2>
        <p class="card-desc" data-i18n="power_off_desc">Stops all VMs and shuts down the Proxmox host.</p>
        <button class="btn btn-danger" id="powerOffBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
          POWER OFF
        </button>
      </section>

      <section class="card force-card">
        <h2 data-i18n="vm_control">VM CONTROL</h2>
        <div id="vmList" class="vm-list">
          <p class="loading" data-i18n="loading_vms">Loading VMs...</p>
        </div>
      </section>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
      <div class="modal modal-wide">
        <div class="modal-header">
          <h2 data-i18n="menu_settings">Settings</h2>
          <button class="icon-btn" id="closeSettings">&times;</button>
        </div>
        <div class="modal-body" id="settingsBody"></div>
      </div>
    </div>

    <!-- Logs Modal -->
    <div class="modal-overlay" id="logsModal">
      <div class="modal modal-wide">
        <div class="modal-header">
          <h2 data-i18n="logs_title">Operation Logs</h2>
          <button class="icon-btn" id="closeLogs">&times;</button>
        </div>
        <div class="modal-body">
          <div id="logsList" class="logs-list"></div>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header"><h2 id="confirmTitle">Confirm</h2></div>
        <div class="modal-body">
          <p id="confirmMessage"></p>
          <div class="modal-actions">
            <button class="btn btn-secondary" id="confirmCancel" data-i18n="cancel">Cancel</button>
            <button class="btn btn-danger" id="confirmOk" data-i18n="confirm">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PCI Conflict Modal -->
    <div class="modal-overlay" id="pciConflictModal">
      <div class="modal">
        <div class="modal-header"><h2 data-i18n="pci_conflict_title">PCI Conflict</h2></div>
        <div class="modal-body">
          <p id="pciConflictMessage"></p>
          <div class="modal-actions">
            <button class="btn btn-secondary" id="pciConflictCancel" data-i18n="cancel">Cancel</button>
            <button class="btn btn-warning" id="pciConflictShutdown" data-i18n="shutdown_and_start">Shutdown & Start</button>
          </div>
        </div>
      </div>
    </div>

    <!-- VM Edit Modal -->
    <div class="modal-overlay" id="vmEditModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="vmEditTitle">VM Settings</h2>
          <button class="icon-btn" id="closeVmEdit">&times;</button>
        </div>
        <div class="modal-body" id="vmEditBody"></div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
